<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reveal Effect Delay Html Example - Atlas UI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="reveal-effect" data-speed="fast">I&apos;m First.</div>

    <div class="reveal-effect" data-delay="0.2">
      I was delayed by 0.2 seconds.
    </div>

    <div class="reveal-effect" data-delay="0.5">
      I was delayed by 0.5 seconds.
    </div>
  </body>

  <script type="module" src="script.js"></script>
</html>
