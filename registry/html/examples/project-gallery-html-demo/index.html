<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Gallery Html Demo - Atlas UI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section id="project-gallery" class="project-gallery">
      <a href="#" class="gallery-item">
        <div class="project-image-container" style="background-color: #efe8d3">
          <img src="https://atlasui.dev/assets/atlas-ui.png" alt="Atlas UI" />
        </div>
        <h2>Atlas UI</h2>
        <p>Frontend</p>
      </a>

      <a href="#" class="gallery-item">
        <div class="project-image-container" style="background-color: #706d63">
          <img src="https://atlasui.dev/assets/portfolio.png" alt="Portfolio" />
        </div>
        <h2>Portfolio</h2>
        <p>Design &amp; Development</p>
      </a>

      <a href="#" class="gallery-item">
        <div class="project-image-container" style="background-color: #fafbfc">
          <img
            src="https://images.unsplash.com/photo-1540652980807-db4655e8fa60?q=80&w=2130&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="Tokyo Art"
          />
        </div>
        <h2>Tokyo Art</h2>
        <p>Photography</p>
      </a>

      <a href="#" class="gallery-item">
        <div class="project-image-container" style="background-color: #404040">
          <img
            src="https://images.unsplash.com/photo-1515705576963-95cad62945b6?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="Milky Way"
          />
        </div>
        <h2>Milky Way</h2>
        <p>Photography</p>
      </a>
    </section>
  </body>
  <script type="module" src="script.js"></script>
</html>
