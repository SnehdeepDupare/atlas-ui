<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Letter Swap - Atlas UI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <span class="letter-swap" data-text="Hover me!">Hover me!</span>

    <span class="letter-swap" data-text="Feature, not a bug" data-reverse>
      Feature, not a bug
    </span>

    <span
      class="letter-swap"
      data-text="Elegant chaos in production"
      data-reverse
      data-stagger-from="last"
      >Elegant chaos in production</span
    >

    <span
      class="letter-swap"
      data-text="Fast, fragile, fantastic"
      data-stagger-from="center"
    >
      Fast, fragile, fantastic
    </span>

    <span
      class="letter-swap"
      data-text="Deploy now, panic later"
      data-stagger-duration="0"
    >
      Deploy now, panic later
    </span>
  </body>
  <script type="module" src="script.js"></script>
</html>
